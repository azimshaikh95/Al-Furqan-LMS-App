name: Build and Sign Zaytun

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      moodle_version:
        description: 'Moodle App Version (tag/branch)'
        required: true
        default: 'v4.3.0'
      app_name:
        description: 'Output App Name'
        required: true
        default: 'Zaytun'

jobs:
  build-android:
    name: Build Signed Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Configuration Repo
        uses: actions/checkout@v4

      - name: Checkout Official Moodle Mobile App
        uses: actions/checkout@v4
        with:
          repository: 'moodlehq/moodleapp'
          ref: "${{ github.event.inputs.moodle_version || 'v4.3.0' }}"
          path: 'moodleapp-source'

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'moodleapp-source/package-lock.json'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Compatible Gradle Version
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Install Exact Android Build Tools Required by Cordova
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;32.0.0"

      - name: Decode Android Keystore File
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.keystore
          echo "Keystore decoded successfully."

      - name: Disable engine strict configuration
        run: |
          if [ -f "moodleapp-source/.npmrc" ]; then
            rm -f moodleapp-source/.npmrc
            echo "Removed .npmrc to bypass strict engine check"
          fi

      - name: Install Moodle App Dependencies
        working-directory: moodleapp-source
        run: |
          npm ci --legacy-peer-deps --ignore-engines
          npm install gulp-cli --save-dev --legacy-peer-deps

      - name: Inject Custom Brand Specifications & Patch Asset Configurations
        run: |
          # 1. Expand asset budgets inside angular.json to bypass sizing warnings
          if [ -f "moodleapp-source/angular.json" ]; then
            echo "Patching asset size thresholds in angular.json..."
            sed -i 's/"maximumWarning": "5mb"/"maximumWarning": "10mb"/g' moodleapp-source/angular.json
            sed -i 's/"maximumError": "5mb"/"maximumError": "12mb"/g' moodleapp-source/angular.json
            sed -i 's/"maximumWarning": "2mb"/"maximumWarning": "10mb"/g' moodleapp-source/angular.json
            sed -i 's/"maximumError": "5mb"/"maximumError": "12mb"/g' moodleapp-source/angular.json
          fi

          # 2. Inject config.json safely into baseline framework trees
          cat << 'EOF' > moodleapp-source/config.json
          {
            "siteurl": "https://learn.zaytunweb.online/",
            "appname": "Zaytun",
            "app_id": "com.iim.moodle",
            "version": "4.3.0",
            "customscheme": "iimzaytun",
            "disabledfeatures": [
              "grades",
              "files",
              "calendar",
              "chat"
            ],
            "push_providers": [
              "airnotifier"
            ],
            "fcm_sender_id": "",
            "airnotifier_url": "https://messages.moodle.net/api/v2",
            "airnotifier_appid": "com.moodle.academy.push",
            "ios_bundle_id": "com.iim.moodle",
            "android_package_name": "com.iim.moodle",
            "branding_options": {
              "logo_text": "REGENT",
              "logo_preset": 3,
              "primary_color": "#800020",
              "accent_color": "#d4af37",
              "header_bg": "#5c061a"
            }
          }
          EOF
          
          mkdir -p moodleapp-source/src/assets
          cp moodleapp-source/config.json moodleapp-source/src/assets/config.json

          # 3. Inject variables.scss custom style overrides
          mkdir -p moodleapp-source/src/theme
          cat << 'EOF' > moodleapp-source/src/theme/variables.scss
          :root {
            --ion-color-primary: #800020;
            --ion-color-primary-rgb: 128,0,32;
            --ion-color-primary-contrast: #ffffff;
            --ion-color-primary-contrast-rgb: 255,255,255;
            --ion-color-primary-shade: #5a0020;
            --ion-color-primary-tint: #a62646;

            --ion-color-secondary: #fdfbeb;
            --ion-color-secondary-rgb: 253,251,235;
            --ion-color-secondary-contrast: #2d1515;

            --ion-color-accent: #d4af37;
            --ion-color-accent-rgb: 212,175,55;

            --ion-background-color: #fcfcf9;
            --ion-background-color-rgb: 252,252,249;

            --ion-text-color: #2d1515;
            --ion-text-color-rgb: 45,21,21;

            --app-header-bg: #5c061a;
            --app-header-text: #ffffff;
          }

          body.dark {
            --ion-color-primary: #9e1b32;
            --ion-color-primary-rgb: 158,27,50;
            --ion-color-primary-contrast: #fffdf5;
            --ion-color-secondary: #3d0a11;
            --ion-color-secondary-contrast: #fdf5f5;
            --ion-background-color: #0f0507;
            --ion-text-color: #fdf5f5;
            --app-header-bg: #210005;
            --app-header-text: #fffdf5;
          }
          EOF

          # 4. Update the target identifier inside config.xml
          if [ -f "moodleapp-source/config.xml" ]; then
            echo "Updating master config.xml parameters..."
            sed -i 's/id="com.moodle.moodlemobile"/id="com.iim.moodle"/g' moodleapp-source/config.xml
            sed -i 's/<name>Moodle Mobile<\/name>/<name>Zaytun<\/name>/g' moodleapp-source/config.xml
          fi

          # 5. Trigger Moodle's baseline build orchestration task tool chains explicitly
          cd moodleapp-source
          npx gulp

      - name: Compile Production Web Assets
        working-directory: moodleapp-source
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm run build

      - name: Integrate Native Android Platform
        working-directory: moodleapp-source
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          NPM_CONFIG_LEGACY_PEER_DEPS: "true"
        run: |
          npm run prod --prefix cordova-plugin-moodleapp
          npx cordova platform add android --no-telemetry || true

      - name: Force Overwrite Compiled Native Assets & Graphics
        run: |
          cp moodleapp-source/config.json moodleapp-source/www/assets/config.json
          cp moodleapp-source/config.json moodleapp-source/platforms/android/app/src/main/assets/www/assets/config.json || true
          
          # AUTOMATED INJECTION OF YOUR FIREBASE FILE
          if [ -f "google-services.json" ]; then
            echo "Custom google-services.json found! Injecting into native target configurations..."
            cp google-services.json moodleapp-source/google-services.json
            cp google-services.json moodleapp-source/platforms/android/app/google-services.json
          else
            echo "Warning: No custom google-services.json found in root repository folder!"
          fi

          if [ -f "icon.png" ]; then
            echo "Injecting custom App Icons..."
            cp icon.png moodleapp-source/platforms/android/app/src/main/res/mipmap-mdpi/ic_launcher.png || true
            cp icon.png moodleapp-source/platforms/android/app/src/main/res/mipmap-hdpi/ic_launcher.png || true
            cp icon.png moodleapp-source/platforms/android/app/src/main/res/mipmap-xdpi/ic_launcher.png || true
            cp icon.png moodleapp-source/platforms/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png || true
            cp icon.png moodleapp-source/platforms/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png || true
            cp icon.png moodleapp-source/platforms/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || true
          fi

          if [ -f "splash.png" ]; then
            echo "Injecting custom Splash Screens..."
            cp splash.png moodleapp-source/platforms/android/app/src/main/res/drawable-land-mdpi/screen.png || true
            cp splash.png moodleapp-source/platforms/android/app/src/main/res/drawable-land-hdpi/screen.png || true
            cp splash.png moodleapp-source/platforms/android/app/src/main/res/drawable-land-xhdpi/screen.png || true
            cp splash.png moodleapp-source/platforms/android/app/src/main/res/drawable-land-xxhdpi/screen.png || true
            cp splash.png moodleapp-source/platforms/android/app/src/main/res/drawable-port-mdpi/screen.png || true
            cp splash.png moodleapp-source/platforms/android/app/src/main/res/drawable-port-hdpi/screen.png || true
            cp splash.png moodleapp-source/platforms/android/app/src/main/res/drawable-port-xhdpi/screen.png || true
            cp splash.png moodleapp-source/platforms/android/app/src/main/res/drawable-port-xxhdpi/screen.png || true
          fi

      - name: Build Android Signed Release APK
        env:
          SIGNING_STORE_FILE: "release.keystore"
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GRADLE_USER_HOME: "${{ github.workspace }}/.gradle_home"
          NODE_ENV: production
          NODE_OPTIONS: --openssl-legacy-provider
          NPM_CONFIG_LEGACY_PEER_DEPS: "true"
        run: |
          cd moodleapp-source
          npx ionic cordova build android --prod --no-interactive
          
          cd platforms/android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/$SIGNING_STORE_FILE \
            -Pandroid.injected.signing.store.password=$SIGNING_STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$SIGNING_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$SIGNING_KEY_PASSWORD \
            --no-daemon

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ github.event.inputs.app_name || 'Zaytun' }}-Signed-APK"
          path: moodleapp-source/platforms/android/app/build/outputs/apk/release/*-release.apk

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Google API Dependencies
        run: pip install google-api-python-client google-auth

      - name: Overwrite APK on Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          DRIVE_FILE_ID: "1vcG3GDzzbRx7xdSjTnfh6omb5RFDq4sC"
        run: |
          python - << 'EOF'
          import os
          import json
          import glob
          import sys
          from google.oauth2.service_account import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          raw_creds = os.environ.get('GDRIVE_CREDENTIALS', '').strip()
          if (raw_creds.startswith('"') and raw_creds.endswith('"')) or (raw_creds.startswith("'") and raw_creds.endswith("'")):
              raw_creds = raw_creds[1:-1].strip()

          try:
              creds_data = json.loads(raw_creds)
          except Exception as e:
              print(f"JSON Parsing Error: Details: {e}")
              sys.exit(1)

          credentials = Credentials.from_service_account_info(creds_data)
          drive_service = build('drive', 'v3', credentials=credentials)
          file_id = os.environ['DRIVE_FILE_ID']
          
          search_path = 'moodleapp-source/platforms/android/app/build/outputs/apk/release/*.apk'
          found_apks = [f for f in glob.glob(search_path) if "unsigned" not in f]

          if not found_apks:
              print("Error: Could not find any signed generated APK file in the release folder!")
              sys.exit(1)

          apk_path = found_apks[0]
          media = MediaFileUpload(apk_path, mimetype='application/vnd.android.package-archive', resumable=True)
          updated_file = drive_service.files().update(fileId=file_id, media_body=media).execute()
          print("Success! Google Drive file updated cleanly.")
          EOF
