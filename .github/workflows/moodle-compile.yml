name: Build and Sign Zaytun

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      moodle_version:
        description: 'Moodle App Version (tag/branch)'
        required: true
        default: 'v4.3.0'
      app_name:
        description: 'Output App Name'
        required: true
        default: 'Zaytun'

env:
  NODE_OPTIONS: --openssl-legacy-provider

jobs:
  build-android:
    name: Build Signed Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Configuration Repo
        uses: actions/checkout@v4

      - name: Checkout Official Moodle Mobile App
        uses: actions/checkout@v4
        with:
          repository: 'moodlehq/moodleapp'
          ref: "${{ github.event.inputs.moodle_version || 'v4.3.0' }}"
          path: 'moodleapp-source'

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'moodleapp-source/package-lock.json'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Compatible Gradle Version
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Install Exact Android Build Tools Required by Cordova
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;32.0.0"

      - name: Decode Android Keystore File
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.keystore
          echo "Keystore decoded successfully."

      - name: Disable engine strict configuration
        run: |
          if [ -f "moodleapp-source/.npmrc" ]; then
            rm -f moodleapp-source/.npmrc
            echo "Removed .npmrc to bypass strict engine check"
          fi

      - name: Install Moodle App Dependencies
        working-directory: moodleapp-source
        run: |
          npm ci --legacy-peer-deps --ignore-engines
          npm install gulp-cli --save-dev --legacy-peer-deps

      - name: Inject Custom Brand Specifications & Patch Asset Configurations
        run: |
          # 1. Expand asset budgets inside angular.json to bypass sizing warnings
          if [ -f "moodleapp-source/angular.json" ]; then
            echo "Patching asset size thresholds in angular.json..."
            sed -i 's/"maximumWarning": "5mb"/"maximumWarning": "10mb"/g' moodleapp-source/angular.json
            sed -i 's/"maximumError": "5mb"/"maximumError": "12mb"/g' moodleapp-source/angular.json
            sed -i 's/"maximumWarning": "2mb"/"maximumWarning": "10mb"/g' moodleapp-source/angular.json
            sed -i 's/"maximumError": "5mb"/"maximumError": "12mb"/g' moodleapp-source/angular.json
          fi

          # 2. Inject config.json safely aligned to Firebase Package identity[cite: 1]
          cat << 'EOF' > moodleapp-source/config.json
          {
            "siteurl": "https://learn.zaytunweb.online/",
            "appname": "Zaytun",
            "app_id": "com.iim.lms",
            "version": "4.3.0",
            "customscheme": "iimzaytun",
            "disabledfeatures": [
              "grades",
              "files",
              "calendar",
              "chat"
            ],
            "push_providers": [
              "airnotifier"
            ],
            "fcm_sender_id": "771166713053",
            "airnotifier_url": "https://messages.moodle.net/api/v2",
            "airnotifier_appid": "com.moodle.academy.push",
            "ios_bundle_id": "com.iim.lms",
            "android_package_name": "com.iim.lms",
            "branding_options": {
              "logo_text": "REGENT",
              "logo_preset": 3,
              "primary_color": "#800020",
              "accent_color": "#d4af37",
              "header_bg": "#5c061a"
            }
          }
          EOF
          
          mkdir -p moodleapp-source/src/assets
          cp moodleapp-source/config.json moodleapp-source/src/assets/config.json

          # 3. Inject variables.scss custom style overrides
          mkdir -p moodleapp-source/src/theme
          cat << 'EOF' > moodleapp-source/src/theme/variables.scss
          :root {
            --ion-color-primary: #800020 !important;
            --ion-color-primary-rgb: 128,0,32 !important;
            --ion-color-primary-contrast: #ffffff !important;
            --ion-color-primary-contrast-rgb: 255,255,255 !important;
            --ion-color-primary-shade: #5a0020 !important;
            --ion-color-primary-tint: #a62646 !important;

            --ion-color-secondary: #fdfbeb !important;
            --ion-color-secondary-rgb: 253,251,235 !important;
            --ion-color-secondary-contrast: #2d1515 !important;

            --ion-color-accent: #d4af37 !important;
            --ion-color-accent-rgb: 212,175,55 !important;

            --ion-background-color: #fcfcf9 !important;
            --ion-background-color-rgb: 252,252,249 !important;

            --ion-text-color: #2d1515 !important;
            --ion-text-color-rgb: 45,21,21 !important;

            --app-header-bg: #5c061a !important;
            --app-header-text: #ffffff !important;
          }
          EOF

          # Hard Injection into theme base maps so Webpack forces styling compilation
          cat moodleapp-source/src/theme/variables.scss >> moodleapp-source/src/theme/theme.base.scss

          # 4. Aligned config.xml to com.iim.lms requirements[cite: 1]
          if [ -f "moodleapp-source/config.xml" ]; then
            echo "Updating master config.xml parameters..."
            sed -i 's/id="com.moodle.moodlemobile"/id="com.iim.lms"/g' moodleapp-source/config.xml
            sed -i 's/<name>Moodle Mobile<\/name>/<name>Zaytun<\/name>/g' moodleapp-source/config.xml
          fi

          # 5. Copy custom Firebase profile into root before compilation loops ignite[cite: 1]
          if [ -f "google-services.json" ]; then
            cp google-services.json moodleapp-source/google-services.json
          fi

          # 6. Trigger Moodle's baseline build task orchestration chain explicitly
          cd moodleapp-source
          npx gulp

      - name: Compile Production Web Assets
        working-directory: moodleapp-source
        run: npm run build

      - name: Inject Custom Staging Files & Graphics
        run: |
          # 1. Seed native resources footprint structure ahead of time
          mkdir -p moodleapp-source/platforms/android/app/src/main/assets/www/assets
          cp moodleapp-source/config.json moodleapp-source/www/assets/config.json || true
          
          # 2. Inject structural assets
          if [ -f "google-services.json" ]; then
            cp google-services.json moodleapp-source/google-services.json
          fi

          # 3. Inject branding resources
          if [ -f "icon.png" ]; then
            mkdir -p moodleapp-source/resources/android
            cp icon.png moodleapp-source/resources/android/icon.png
            cp icon.png moodleapp-source/icon.png
          fi
          if [ -f "splash.png" ]; then
            mkdir -p moodleapp-source/resources/android
            cp splash.png moodleapp-source/resources/android/splash.png
            cp splash.png moodleapp-source/splash.png
          fi

          # 4. Build custom Cordova build configuration file to handle release signatures natively
          cat << 'EOF' > moodleapp-source/build.json
          {
            "android": {
              "release": {
                "keystore": "../release.keystore",
                "storePassword": "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}",
                "alias": "${{ secrets.ANDROID_KEY_ALIAS }}",
                "password": "${{ secrets.ANDROID_KEY_PASSWORD }}",
                "keystoreType": ""
              }
            }
          }
          EOF

      - name: Assemble Final Native Signed Application Build
        working-directory: moodleapp-source
        env:
          NPM_CONFIG_LEGACY_PEER_DEPS: "true"
        run: |
          npm run prod --prefix cordova-plugin-moodleapp
          npx cordova platform add android --no-telemetry || true
          
          # -- --apk explicitly instructs the Gradle processor to generate an APK rather than a bundle mapping
          npx cordova build android --release --device --buildConfig=build.json --no-telemetry --no-interactive -- --apk

      - name: Upload Signed Application Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ github.event.inputs.app_name || 'Zaytun' }}-Signed-Build"
          path: |
            moodleapp-source/platforms/android/**/*.apk
            moodleapp-source/platforms/android/**/*.aab

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Google API Dependencies
        run: pip install google-api-python-client google-auth

      - name: Overwrite APK on Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          DRIVE_FILE_ID: "1vcG3GDzzbRx7xdSjTnfh6omb5RFDq4sC"
        run: |
          python - << 'EOF'
          import os
          import json
          import glob
          import sys
          from google.oauth2.service_account import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          raw_creds = os.environ.get('GDRIVE_CREDENTIALS', '').strip()
          if (raw_creds.startswith('"') and raw_creds.endswith('"')) or (raw_creds.startswith("'") and raw_creds.endswith("'")):
              raw_creds = raw_creds[1:-1].strip()

          try:
              creds_data = json.loads(raw_creds)
          except Exception as e:
              print(f"JSON Parsing Error: Details: {e}")
              sys.exit(1)

          credentials = Credentials.from_service_account_info(creds_data)
          drive_service = build('drive', 'v3', credentials=credentials)
          file_id = os.environ['DRIVE_FILE_ID']
          
          # Dual lookup matching either output extension layout explicitly
          search_extensions = ['*.apk', '*.aab']
          search_roots = [
              'moodleapp-source/platforms/android/app/build/outputs/apk/release/',
              'moodleapp-source/platforms/android/app/build/outputs/bundle/release/',
              'moodleapp-source/platforms/android/app/build/outputs/*/',
              'moodleapp-source/platforms/android/release/',
              'moodleapp-source/platforms/android/'
          ]
          
          found_files = []
          for ext in search_extensions:
              for root in search_roots:
                  pattern = os.path.join(root, ext)
                  found_files.extend([f for f in glob.glob(pattern) if "unsigned" not in f])

          if not found_files:
              print("Error: Could not find any signed generated APK or AAB file in the workspace directory trees!")
              sys.exit(1)

          # Target the newest generated binary file
          found_files.sort(key=os.path.getmtime, reverse=True)
          target_path = found_files[0]
          print(f"Found production artifact target for injection: {target_path}")
          
          media = MediaFileUpload(target_path, mimetype='application/octet-stream', resumable=True)
          updated_file = drive_service.files().update(fileId=file_id, media_body=media).execute()
          print("Success! Google Drive file updated cleanly.")
          EOF
