name: Build and Sign Zaytun

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      moodle_version:
        description: 'Moodle App Version (tag/branch)'
        required: true
        default: 'v4.3.0'
      app_name:
        description: 'Output App Name'
        required: true
        default: 'Al-Furqan'

env:
  NODE_OPTIONS: --openssl-legacy-provider

jobs:
  build-android:
    name: Build Signed Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Configuration Repo
        uses: actions/checkout@v4

      - name: Checkout Official Moodle Mobile App
        uses: actions/checkout@v4
        with:
          repository: 'moodlehq/moodleapp'
          ref: "${{ github.event.inputs.moodle_version || 'v4.3.0' }}"
          path: 'moodleapp-source'

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'moodleapp-source/package-lock.json'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Compatible Gradle Version
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6'

      - name: Install Exact Android Build Tools Required by Cordova
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;32.0.0"

      - name: Disable engine strict configuration
        run: |
          if [ -f "moodleapp-source/.npmrc" ]; then
            rm -f moodleapp-source/.npmrc
            echo "Removed .npmrc to bypass strict engine check"
          fi

      - name: Install Moodle App Dependencies
        working-directory: moodleapp-source
        run: |
          npm ci --legacy-peer-deps --ignore-engines
          npm install gulp-cli --save-dev --legacy-peer-deps

      - name: Inject Custom Brand Specifications & Patch Asset Configurations
        run: |
          # 1. Expand asset budgets inside angular.json to bypass sizing warnings
          if [ -f "moodleapp-source/angular.json" ]; then
            echo "Patching asset size thresholds in angular.json..."
            sed -i 's/"maximumWarning": "5mb"/"maximumWarning": "10mb"/g' moodleapp-source/angular.json
            sed -i 's/"maximumError": "5mb"/"maximumError": "12mb"/g' moodleapp-source/angular.json
            sed -i 's/"maximumWarning": "2mb"/"maximumWarning": "10mb"/g' moodleapp-source/angular.json
            sed -i 's/"maximumError": "5mb"/"maximumError": "12mb"/g' moodleapp-source/angular.json
          fi

          # 2. Inject your exact verified moodle.json directly into the root folder
          cat << 'EOF' > moodleapp-source/moodle.json
          {
              "app_id": "com.iim.lms",
              "appname": "Al-Furqan",
              "versioncode": 53000,
              "versionname": "5.3.0",
              "cache_update_frequency_usually": 420000,
              "cache_update_frequency_often": 1200000,
              "cache_update_frequency_sometimes": 3600000,
              "cache_update_frequency_rarely": 43200000,
              "default_lang": "en",
              "languages": {
                  "af": "Afrikaans",
                  "ar": "العربية",
                  "az": "Azərbaycanca",
                  "bg": "Български",
                  "ca": "Català",
                  "cs": "Čeština",
                  "da": "Dansk",
                  "de": "Deutsch",
                  "de-du": "Deutsch (du)",
                  "el": "Ελληνικά",
                  "en": "English",
                  "en-us": "English (United States)",
                  "es": "Español - Internacional",
                  "es-mx": "Español - México",
                  "eu": "Euskara",
                  "fa": "فارسۍ",
                  "fi": "Suomi",
                  "fr": "Français",
                  "gl": "Galego",
                  "he": "עברית",
                  "hi": "हिंदी",
                  "hr": "Hrvatski",
                  "hsb": "Hornjoserbsce",
                  "hu": "magyar",
                  "hy": "Հայերեն",
                  "id": "Bahasa Indonesia",
                  "it": "Italiano",
                  "ja": "日本語",
                  "km": "ខ្មែរ",
                  "kn": "ಕನ್ನಡ",
                  "ko": "한국어",
                  "lo": "ລາວ",
                  "lt": "Lietuvių",
                  "lv": "Latviešu",
                  "mn": "Монгол",
                  "mr": "मराठी",
                  "nl": "Nederlands",
                  "no": "Norsk",
                  "pl": "Polski",
                  "ps": "ليسي",
                  "pt": "Português - Portugal",
                  "pt-br": "Português - Brasil",
                  "ro": "Română",
                  "ru": "Русский",
                  "sl": "Slovenščina",
                  "sq": "Shqip",
                  "sr-cr": "Српски",
                  "sr-lt": "Srpski",
                  "sv": "Svenska",
                  "szl": "Ślōnski",
                  "tg": "Тоҷикӣ",
                  "tr": "Türkçe",
                  "uk": "Українська",
                  "uz": "O'zbekcha",
                  "vi": "Vietnamese",
                  "zh-cn": "简体中文",
                  "zh-tw": "正體中文"
              },
              "wsservice": "moodle_mobile_app",
              "defaultZoomLevel": "none",
              "zoomlevels": {
                  "none": 100,
                  "medium": 110,
                  "high": 120
              },
              "customurlscheme": "iimlms",
              "sites": [
                  {"name": "Al-Furqan","url": "https://learn.zaytunweb.online/"}
              ],
              "multisitesdisplay": "",
              "sitefindersettings": {},
              "onlyallowlistedsites": true,
              "forcedefaultlanguage": false,
              "privacypolicy": "https://moodle.net/moodle-app-privacy/",
              "notificoncolor": "#800020",
              "enableanalytics": false,
              "forceColorScheme": "",
              "forceLoginLogo": false,
              "showTopLogo": "hidden",
              "ioswebviewscheme": "moodleappfs",
              "appstores": {
                  "android": "com.iim.lms",
                  "ios": "com.iim.lms"
              },
              "wsrequestqueuelimit": 10,
              "wsrequestqueuedelay": 100,
              "calendarreminderdefaultvalue": 3600,
              "toastDurations": {
                  "short": 2000,
                  "long": 3500,
                  "sticky": 0
              },
              "disableTokenFile": false,
              "iconsPrefixes": {
                  "font-awesome": {
                      "brands": [
                          "fab"
                      ],
                      "regular": [
                          "far"
                      ],
                      "solid": [
                          "fa",
                          "fas"
                      ]
                  },
                  "moodle": {
                      "font-awesome": [
                          "fam"
                      ],
                      "moodle": [
                          "moodle"
                      ]
                  }
              },
              "clearIABSessionWhenAutoLogin": "android",
              "collapsibleItemsExpanded": false
          }
          EOF

          # 3. DIRECT SCSS INJECTION: Populating Moodle's native blank hooks file directly
          mkdir -p moodleapp-source/src/theme
          cat << 'EOF' > moodleapp-source/src/theme/globals.custom.scss
          :root {
            --ion-color-primary: #800020 !important;
            --ion-color-primary-rgb: 128,0,32 !important;
            --ion-color-primary-contrast: #ffffff !important;
            --ion-color-primary-contrast-rgb: 255,255,255 !important;
            --ion-color-primary-shade: #5a0020 !important;
            --ion-color-primary-tint: #a62646 !important;

            --ion-color-secondary: #fdfbeb !important;
            --ion-color-secondary-rgb: 253,251,235 !important;
            --ion-color-secondary-contrast: #2d1515 !important;

            --ion-color-accent: #d4af37 !important;
            --ion-color-accent-rgb: 212,175,55 !important;

            --ion-background-color: #fcfcf9 !important;
            --ion-background-color-rgb: 252,252,249 !important;

            --ion-text-color: #2d1515 !important;
            --ion-text-color-rgb: 45,21,21 !important;

            --app-header-bg: #5c061a !important;
            --app-header-text: #ffffff !important;
          }
          EOF

          # 4. Aligned config.xml properties to package configurations
          if [ -f "moodleapp-source/config.xml" ]; then
            echo "Updating master config.xml parameters..."
            sed -i 's/id="com.moodle.moodlemobile"/id="com.iim.lms"/g' moodleapp-source/config.xml
            sed -i 's/<name>Moodle Mobile<\/name>/<name>Al-Furqan<\/name>/g' moodleapp-source/config.xml
            
            sed -i '/<platform name="android">/a \        <preference name="android-minSdkVersion" value="24" \/>' moodleapp-source/config.xml
            sed -i '/<platform name="android">/a \        <preference name="android-build-type" value="apk" \/>' moodleapp-source/config.xml
          fi

          # 5. Seed official google-services token profiles
          if [ -f "google-services.json" ]; then
            cp google-services.json moodleapp-source/google-services.json
          fi

          # 6. Fire up Gulp to process moodle.json natively
          cd moodleapp-source
          npx gulp

      - name: Compile Production Web Assets
        working-directory: moodleapp-source
        run: npm run build

      - name: Inject Custom Staging Graphics
        run: |
          if [ -f "icon.png" ]; then
            mkdir -p moodleapp-source/resources/android
            cp icon.png moodleapp-source/resources/android/icon.png
            cp icon.png moodleapp-source/icon.png
          fi
          if [ -f "splash.png" ]; then
            mkdir -p moodleapp-source/resources/android
            cp splash.png moodleapp-source/resources/android/splash.png
            cp splash.png moodleapp-source/splash.png
          fi

      - name: Assemble Unsigned Production Base Build
        working-directory: moodleapp-source
        env:
          NPM_CONFIG_LEGACY_PEER_DEPS: "true"
        run: |
          npm run prod --prefix cordova-plugin-moodleapp
          
          npx ionic cordova platform remove android --no-interactive || true
          npx ionic cordova platform add android --no-interactive --confirm
          
          # Force the generated Android project wrapper to use Gradle 7.6 properties layout natively
          if [ -f "platforms/android/gradle/wrapper/gradle-wrapper.properties" ]; then
            sed -i 's/gradle-.*-all.zip/gradle-7.6-all.zip/g' platforms/android/gradle/wrapper/gradle-wrapper.properties
          fi

          echo "cdvAndroidBundle=false" >> platforms/android/gradle.properties
          echo "cdvBuildMultipleApks=false" >> platforms/android/gradle.properties

          npx ionic cordova build android --release --device --no-interactive

      - name: Sign Production Release Android Binary
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: moodleapp-source/platforms/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          singleOp: true
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Debug Output Artifact Tree Paths
        run: |
          echo "Finding compiled finalized distributions..."
          find moodleapp-source/platforms/android/ -name "*.apk" || true

      - name: Upload Signed Application Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ github.event.inputs.app_name || 'Al-Furqan' }}-Signed-Build"
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Google API Dependencies
        run: pip install google-api-python-client google-auth

      - name: Overwrite APK on Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          DRIVE_FILE_ID: "1vcG3GDzzbRx7xdSjTnfh6omb5RFDq4sC"
          SIGNED_APK_PATH: ${{ steps.sign_app.outputs.signedReleaseFile }}
        run: |
          python - << 'EOF'
          import os
          import json
          import sys
          from google.oauth2.service_account import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          raw_creds = os.environ.get('GDRIVE_CREDENTIALS', '').strip()
          if (raw_creds.startswith('"') and raw_creds.endswith('"')) or (raw_creds.startswith("'") and raw_creds.endswith("'")):
              raw_creds = raw_creds[1:-1].strip()

          try:
              creds_data = json.loads(raw_creds)
          except Exception as e:
              print(f"JSON Parsing Error: Details: {e}")
              sys.exit(1)

          credentials = Credentials.from_service_account_info(creds_data)
          drive_service = build('drive', 'v3', credentials=credentials)
          file_id = os.environ['DRIVE_FILE_ID']
          apk_path = os.environ.get('SIGNED_APK_PATH', '')

          if not apk_path or not os.path.exists(apk_path):
              print(f"Error: Target path validation failed for: {apk_path}")
              sys.exit(1)

          print(f"Uploading finalized verified artifact: {apk_path}")
          media = MediaFileUpload(apk_path, mimetype='application/vnd.android.package-archive', resumable=True)
          updated_file = drive_service.files().update(fileId=file_id, media_body=media).execute()
          print("Success! Google Drive file updated cleanly.")
          EOF
